<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme initialization: prevents flash of wrong theme before React loads -->
    <script>
      (function(){
        var t = localStorage.getItem('portfolio-theme');
        document.documentElement.setAttribute('data-theme', t || 'light');
      })();
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- SEO -->
    <title>Aleh Sitsko | Software Developer Portfolio</title>
    <meta name="description" content="Aleh Sitsko is a Philadelphia-based software developer with an EMS operations background, building practical web tools using React, JavaScript, Python, Flask, SQLAlchemy, and modern full-stack workflows." />
    <meta name="keywords" content="full stack developer, React, Flask, Python, EMS, workflow systems, internal tools, Philadelphia, software developer portfolio" />
    <meta name="author" content="Aleh Sitsko" />
    <link rel="canonical" href="https://alehsitsko.dev" />

    <!-- Theme color (light default) -->
    <meta name="theme-color" content="#f8fafc" />

    <!-- Open Graph -->
    <meta property="og:title" content="Aleh Sitsko | Software Developer Portfolio" />
    <meta property="og:description" content="Philadelphia-based software developer building practical web applications, internal tools, workflow systems, and operations-focused software." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://alehsitsko.dev" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Aleh Sitsko | Software Developer Portfolio" />
    <meta name="twitter:description" content="Philadelphia-based software developer building practical web applications, internal tools, and workflow systems." />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Aleh Sitsko",
      "url": "https://alehsitsko.dev",
      "jobTitle": "Full Stack Developer",
      "description": "Operations-focused full stack developer building practical web applications, internal tools, workflow systems, and operations software using React, Python, Flask, and SQLAlchemy.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Philadelphia area",
        "addressRegion": "PA",
        "addressCountry": "US"
      },
      "sameAs": [
        "https://github.com/AlehSitsko",
        "https://linkedin.com/in/alehsitsko"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
